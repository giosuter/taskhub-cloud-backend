spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:taskhub;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:            

server:
  port: 8080
  servlet:
    # Keep same as production path for consistent URLs in dev
    context-path: /taskhub-cloud
    
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true  